  chapter_description: Mason and Iris meet during a tense professional disagreement.
  chapter_body: "**Bölüm 1 – Profesyonel Anlaşmazlık**  \n\nKafe hâlâ aynı sabah gürültüsüyle\
    \ doluydu. Masalar sıkı ama rahat. Masanın köşesinde Mason hâlâ kitabını okuyor,\
    \ ara ara kahve fincanına bakıyordu. Iris, aynı masada, gümüş yüzüğünü parmakları\
    \ arasında tutuyordu. Maisie, kapının yan tarafında oturmuş, çayını içiyordu.\
    \  \n\nBir anda masanın ortasında bir dosya belirdi. Dosya, “Şehir Festivali Projesi”\
    \ başlığına sahipti. Mason dosyayı açtı ve yüksek sesle söyledi:\n\n- “Biz, sahne\
    \ yerini bu köşeye koymalıyız. Böylece daha çok insan görebilir.”\n\nIris dosyayı\
    \ inceledi. Gözleri bir an düşündü, sonra yumuşak bir sesle yanıtladı:\n\n- “Ben,\
    \ sahneyi anı köşesine koymak istiyorum. Orası daha sessiz ve güzel bir manzara\
    \ verir.”\n\nMason’ın kaşıları çattı. Elini masanın kenarına bastırdı ve biraz\
    \ titreşti.\n\n- “Ama o köşe çok karanlık. İnsanlar sahneyi göremez. Bu projenin\
    \ başarısı için ışık gerekir.”\n\nIris sakin bir şekilde yüzüğünü sıkmadı. Yavaşça\
    \ konuştu:\n\n- “Işık problemi var ama we, doğal ışığı kullanabiliriz. Güneş doğarken\
    \ sahne orada olur. Bu, ziyaretçiler için bir sürpriz olur.”\n\nMason bir an durdu.\
    \ Nefesini çekti ve gözlüğünün kenarına dokundu.\n\n- “Senin fikrin güzel, ama\
    \ ben daha güvenli bir yer istiyorum. İnsanların güvenliği bizim önceliğimiz.”\n\
    \nMasadaki sessizlik, kahve kokusuyla karıştı. Maisie gözlerini masaya çevirdi,\
    \ ama bir şey söylemedi. O sadece izliyordu.\n\nIris bir adım öne çıktı. Elini\
    \ masanın üzerine koydu.\n\n- “Mason, birlikte çalışabiliriz. Sen ışık ve güvenlik\
    \ konularını düşün, ben de manzarayı planlarım. Böyle bir denge buluruz.”\n\n\
    Mason gözlüğünün altına bakarak biraz rahatladi. Gülümsemesi zayıftı ama sesinde\
    \ bir sıcaklık vardı.\n\n- “Tamam, Iris. Seninle çalışmaya hazırım. Ama bir şey\
    \ daha var. Projenin bütçesi çok az. Bu planı nasıl yapacağız?”\n\nIris hafifçe\
    \ başını salladı.\n\n- “Bütçeyi kontrol edebiliriz. Gereksiz harcamaları azaltırız.\
    \ Ben de sponsorluk bulmaya çalışırım.”\n\nMason bir kez daha dosyayı açtı ve\
    \ üzerine notlar almaya başladı. \n\n- “Bu iyi bir başlangıç. Yarın bir toplantı\
    \ yapalım. Daha detaylı konuşuruz.”\n\nIris gülümseyerek başını eğdi.\n\n- “Evet,\
    \ yarın görüşürüz.”\n\nMasada bir kez daha sessizlik hâkim oldu, ama bu sefer\
    \ farklı bir sessizlikti. Artık bir anlaşmazlık değil, bir iş birliği havası vardı.\
    \ Maisie, bir yudum çayını aldı ve düşünceli bir bakış attı.  \n\nKafe hâlâ sabah\
    \ ışıklarıyla parlıyordu. Mason kalemiyle yazdı, Iris dosyayı kapattı ve yüzüğünü\
    \ hafifçe parlatmaya baktı. İkisi de yeni bir başlangıç için umutlu gözlerle dışarı\
    \ baktılar.  \n\n**Bölüm Sonu**"
  chapter_summary: "**Bölüm 1 – Profesyonel Anlaşmazlık (özet notları)**  \n\n- Kafe\
    \ sabah olur. Masada Mason, Iris, Maisie oturur.  \n- Masanın ortasında “Şehir\
    \ Festivali Projesi” dosyası belirir.  \n- Mason: sahneyi köşeye koymak ister.\
    \  \n- Iris: sahneyi başka köşeye koymak ister.  \n- İki kişi sahne yeri hakkında\
    \ tartışır.  \n- Iris, doğal ışık ve güzel manzara söyler.  \n- Mason, güvenlik\
    \ ve ışık sorununu söyler.  \n- Maisie sessiz izler.  \n- Iris: “Birlikte çalışalım.”\
    \ der.  \n- Mason: “Tamam, ama bütçe az.” der.  \n- Iris: bütçeyi kontrol eder,\
    \ sponsorluk arar.  \n- İkisi: yarın toplantı yapacak.  \n- Duygular: önce tartışma,\
    \ sonra anlaşma, umut.  \n- Yeni bilgi: bütçe az, sponsorluk gerek.  \n- Çözülmemiş:\
    \ bütçeyi nasıl tam dolduracağız.  \n- Son durum: Mason ve Iris iş birliği yapıyor,\
    \ umutlu, Maisie düşünceli.  "
