  chapter_body: "Der Weg vom Kristallsee zum Turm des Weisen war lang und schmal.\
    \ Der moosige Pfad schlängelte sich durch dunkle Eichen, und das silbrige Licht\
    \ des Kristalls lag wie ein kleiner Stern auf Rose’s Hand. Jasper ging dicht neben\
    \ ihr, sein Herz schlug schnell, weil er die Hoffnung spürte, Eldoria endlich\
    \ zu retten. \n\nViolet schritt voraus, ihren Blick fest auf den Himmel gerichtet.\
    \ Sie hielt einen langen Stab, aus dem ein schwaches Leuchten austrat. Noah war\
    \ etwas weiter hinten, seine Augen glitten über die Bäume, als suchte er etwas\
    \ Bestimmtes. Die Luft war kalt, und ein leiser Wind flüsterte durch die Blätter.\
    \  \n\n„Wir müssen schnell zum Turm“, sagte Jasper. „Der Weise wird uns sagen,\
    \ wie das Versprechen vollendet werden kann.“  \n\nRose nickte, aber ihr Blick\
    \ wanderte zu dem Kristall. „Ich fühle, dass das Versprechen stark ist, aber der\
    \ Fluch ist immer noch da“, flüsterte sie.  \n\nViolet hielt plötzlich inne. „Jasper,\
    \ Rose, ich habe etwas, das wir nicht vergessen dürfen.“ Ihre Stimme war leise,\
    \ aber entschlossen. Sie zog ein altes Pergament aus ihrer Tasche. Auf dem Pergament\
    \ war ein Symbol zu sehen, das exakt dem Anhänger ähnelte, den Rose getragen hatte.\
    \  \n\n„Das ist das wahre Herz der Wächter“, sagte Violet. „Es kann den Fluch\
    \ zertrümmern, aber nur, wenn es allein genutzt wird.“  \n\nNoah trat näher. „Du\
    \ willst das allein benutzen, Violet? Das ist gefährlich. Der Fluch frisst das\
    \ Herz, das zu gierig wird.“  \n\nViolet sah Noah direkt an. „Du verstehst das\
    \ nicht, Noah. Ich habe viele Jahre im Verborgenen gelebt, um das Königreich zu\
    \ schützen. Wenn ich das Herz benutze, kann ich den Fluch sofort beenden.“  \n\
    \nEin plötzliches Krachen durchbrach die Stille. Ein großer Baumstamm fiel und\
    \ blockierte den Pfad. Der Schatten des Baumes legte sich über die Gruppe. In\
    \ diesem Moment zog Violet das Pergament aus ihrer Tasche und legte es behutsam\
    \ auf den Kristall. Das Licht des Kristalls flackerte, wurde dunkler.  \n\n„Was\
    \ machst du?“, rief Jasper, doch seine Stimme hallte nur schwach.  \n\nViolet\
    \ hob die Hand, und ein warmer, bläulicher Funken schoss aus dem Kristall in das\
    \ Pergament. Der Funken berührte Rose’s Anhänger, und sofort spürte Rose einen\
    \ stechenden Schmerz in ihrer Brust. Sie fiel zu Boden, ihr Griff um den Kristall\
    \ lockerte sich.  \n\n„Nein!“, schrie sie, Tränen liefen ihr das Gesicht hinunter.\
    \  \n\nNoah sprang nach vorne, versuchte Rose zu halten, doch Violet schob ihn\
    \ zurück. „Ihr könnt mich nicht aufhalten“, sagte sie kalt. „Der Fluch muss beendet\
    \ werden, egal welchen Preis er kostet.“  \n\nIn dem Moment, als das Licht des\
    \ Kristalls erlosch, hörten sie ein tiefes Grollen aus dem Wald. Der Fluch selbst\
    \ schien zu erwachen, ein dunkler Nebel stieg aus dem Boden auf und umhüllte die\
    \ Gruppe.  \n\nJasper griff nach Rose’s Hand, aber das Pergament hatte das Licht\
    \ bereits verschluckt. Der Kristall lag nun leblos auf dem Boden, und ein eisiger\
    \ Hauch wehte durch die Äste.  \n\n„Du hast uns verraten“, flüsterte Rose, während\
    \ sie versuchte, aufzustehen. Ihre Stimme war schwach, aber ihr Blick war fest.\
    \  \n\nViolet sah ihr in die Augen, dann wandte sie sich ab. „Ich habe das Königreich\
    \ gerettet, ja, aber ich muss jetzt gehen.“ Sie drehte sich um und verschwand\
    \ zwischen den Bäumen, das Pergament fest an ihrer Brust.  \n\nNoah blieb stehen,\
    \ zerrissen zwischen Zorn und Verzweiflung. „Wir müssen das Herz zurückholen,\
    \ sonst ist Eldoria verloren“, sagte er, doch die Worte klangen hohl, weil er\
    \ den Blick von Violet bereits verloren hatte.  \n\nJasper sah zu Rose, die immer\
    \ noch zitterte. „Wir schaffen das zusammen“, sagte er entschlossen. „Wir finden\
    \ einen Weg, den Fluch zu brechen, ohne das Herz zu benutzen.“  \n\nRose nickte\
    \ schwach. Sie stand auf, hob den silbernen Anhänger und das Pergament, das jetzt\
    \ vom Blut getränkt war. Der Nebel um sie herum wurde dichter, doch ein kleiner\
    \ Schimmer des Kristalls war noch zu sehen – ein Funke, der nicht ganz erloschen\
    \ war.  \n\n„Wir müssen zum Turm, bevor der Fluch uns ganz einhüllt“, sagte Jasper.\
    \  \n\nNoah blickte zurück, wo Violet im Wald verschwand war. Tränen liefen über\
    \ sein Gesicht, doch er sammelte seine Kraft. „Ich folge euch“, flüsterte er,\
    \ „auch wenn ich nicht weiß, ob ich euch noch trauen kann.“  \n\nDie vier Freunde\
    \ – jetzt nur noch Jasper, Rose und Noah – setzten ihren Weg fort. Der Wald schien\
    \ lebendig zu werden, Rufe von unsichtbaren Kreaturen hallten durch die Zweige.\
    \ Jeder Schritt war schwer, als das Gewicht des Verrats auf ihnen lastete.  \n\
    \nDoch in ihren Herzen brannte ein Funke Hoffnung. Der Kristall war nicht ganz\
    \ erloschen, und das Versprechen der Wächter lebte weiter in Rose’s Herzen. Sie\
    \ schwor sich, das Königreich zu schützen, selbst wenn sie die Hilfe von Violet\
    \ nicht mehr bekommen würde.  \n\nDer Weg zum Turm war noch lang, und das dunkle\
    \ Fluch-Gefühl folgte ihnen wie ein Schatten. Aber die Gruppe war jetzt getrennt\
    \ – nicht nur von Violet, sondern auch durch das Missverständnis, das zwischen\
    \ ihnen entstanden war.  \n\nJasper sah in die Ferne, wo die Silhouette des Turms\
    \ wie ein grauer Leuchtturm im Nebel stand. „Egal, was passiert“, sagte er, „wir\
    \ gehen zusammen bis zum Schluss.“  \n\nRose drückte den Anhänger fester, während\
    \ Noah den Stab tief in den Boden setzte, um das Gleichgewicht zu halten. Der\
    \ Wald um sie herum flüsterte weiter, doch das leise Summen des Kristalls wurde\
    \ wieder etwas stärker. Es war ein Zeichen, dass das Versprechen noch nicht verloren\
    \ war, auch wenn ein Verräter sie getrennt hatte.  \n\nSie gingen weiter, jeder\
    \ Schritt ein neues Kapitel des Kampfes, bis sie schließlich den Turm erreichen\
    \ würden – vielleicht nicht als Ganzes, doch mit der Entschlossenheit, Eldoria\
    \ zu retten.  "
  chapter_summary: "**Kapitel‑Zusammenfassung (Deutsch, B1)**  \n\n- Der Weg vom Kristallsee\
