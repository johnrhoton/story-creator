  chapter_description: Maisie encourages Iris to give Mason another chance.
  chapter_body: '**Bölüm 2 – Maisie, Iris’e Mason’a bir şans vermesini söyler**


    Kafe hâlâ sessizdi. Güneş pencerenin üzerinden içeri giriyordu. Masanın üzerinde
    “Şehir Festivali Projesi” dosyası duruyordu. Mason ve Iris hâlâ oturmuş, dosyayı
    inceliyordu.


    Maisie masaya yaklaştı. Elindeki kahve fincanını hafifçe bıraktı. Gözleri iki
    genç insanı izliyordu. Iris, yüzükünü parmakta tutuyordu. Mason ise gözlüklerini
    bir kez daha düzeltti.


    — Iris, bir şey söylemek istiyorum — dedi Maisie, sesini yumuşatarak.


    Iris başını kaldırdı. Gözleri masaya bakıyordu. Hafif bir gülümseme vardı ama
    gözlerinde hâlâ bir kararsızlık.


    — Ne demek istiyorsun? — diye sordu Iris.


    — Mason çok çalışıyor. Biliyorsun, bütçeyi bulmak zor. Ama o da senin gibi projeye
    çok önem veriyor — dedi Maisie. — O, sahneyi köşeye koymak istediğinde, güvenliği
    düşündü. Sen de ışığı düşündün. İkiniz aynı şeyi istiyorsunuz.


    Iris hafifçe başını salladı. Yüzük parmağından kaymadı.


    — Ama... o çok çabuk karar veriyor. Bazen acele ediyor — diye ekledi Iris.


    — Evet, belki — cevapladı Maisie. — Ama kimse mükemmel değil. Biz de herkes gibi
    bir şeyler öğreniriz. Tekrar denemek, ona bir şans vermek, anlamına gelmez ki
    her şey mükemmel olur. Sadece bir adım atmak demektir.


    Maisie bir elini Iris’in omzuna koydu. Iris’in omzu hafifçe titredi.


    — Bak, sen de bir şans verdin ona önce. Sen, sahneyi farklı bir yere koymak istediğinde
    ona dinlemeyi teklif ettin — dedi Maisie. — Şimdi ona dinleme zamanı.


    Iris derin bir nefes aldı. Gözleri masadaki dosyaya baktı. Sayfalar, renkli planlar,
    notlar... Hepsi bir geleceği gösteriyordu.


    — Tamam — dedi Iris yumuşak bir sesle. — Bir şans daha verebilirim. Yarınki toplantıyı
    bekleyelim.


    Mason hafifçe gülümsedi. Gözleri umutla parladı. Masanın üzerindeki dosyayı kapattı
    ve elini Iris’in eline dokundurdu. Ellerini nazikçe sıkıştırdı.


    — Teşekkür ederim, Iris — dedi Mason. — Seni hayal kırıklığına uğratmamak için
    elimden geleni yapacağım.


    Maisie başını salladı. Gülümsemesi baştan çıkarmış gibiydi.


    — İyi ki yaptınız — dedi. — Birlikte çalışırsanız, festival çok güzel olur.


    Kafe içinde hafif bir melodi çalmaya başladı. Kahve kokusu hala tazeydi. Üç kişi
    aynı masada oturdu, ama artık birbirlerine daha az mesafeyle bakıyorlardı.


    Iris yüzükünü bir kez daha tuttu. Bu sefer elleri daha az titriyordu. Mason’ın
    çekingen gülümsemesi, bir umut ışığı gibiydi. Maisie ise sessizce izliyordu; içi
    hâlâ dikkatliydi ama artık bir parça rahatlamıştı.


    Gün batmaya doğru, kafe yavaşça kapanıyordu. Üç kişi, yarınki toplantı için planlarını
    düşündü. Iris, Mason’a bir şans vermeye karar vermişti. Bu karar, küçük bir adım
    olacaktı ama büyük bir umut taşıyordu.'
