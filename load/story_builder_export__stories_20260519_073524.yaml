  chapter_body: "Der Himmel über Eldoria war trüb, und ein kühler Wind wehte von den\
    \ dunklen Bäumen des verzauberten Waldes. Die vier Freunde verließen den Marktplatz\
    \ und gingen den gepflasterten Weg entlang, der zum alten Turm des Weisen führte.\
    \ In Roses Hand glitzerte der silberne Anhänger, als wäre er ein kleiner Stern.\n\
    \nViolet ging dicht hinter ihnen und hielt den Blick auf den Weg gerichtet. Sie\
    \ sah, wie Jasper immer wieder über die schmalen Steine stolperte, voller Energie\
    \ und Neugier. Plötzlich blieb sie stehen und drehte sich zu ihm um.\n\n„Jasper“,\
    \ sagte sie leise, aber bestimmt, „ich muss dir etwas Wichtiges sagen.“  \n\n\
    Jasper sah sie verwirrt an. „Was ist los, Violet? Warum bist du so ernst?“  \n\
    \nViolet holte tief Luft. „Unser Königreich ist verflucht.“  \n\nEin Schauer lief\
    \ Jasper über den Rücken. „Verflucht? Wie meinst du das?“  \n\n„Schon seit vielen\
    \ Jahrhunderten“, erklärte Violet, „liegt ein alter Fluch über Eldoria. Er wurde\
    \ von einer bösen Macht ausgesprochen, als die ersten Wächter das Land verließen.\
    \ Der Fluch erwacht immer wieder, wenn das Versprechen der Wächter vergessen wird.“\
    \  \n\nSie zeigte auf den Anhänger in Roses Hand. „Dieser Ring ist ein Zeichen\
    \ der alten Wächter. Er erinnert an das Versprechen, das Land zu beschützen. Wenn\
    \ das Versprechen nicht gehalten wird, stärkt der Fluch seine Macht.“  \n\nRose\
    \ sah nervös zu dem silbernen Schmuckstück hinunter und flüsterte: „Ich fühle\
    \ das Versprechen in meinem Inneren. Vielleicht habe ich es beinahe vergessen.“\
    \  \n\nViolet nickte. „Genau deshalb ist es wichtig, dass wir jetzt handeln. Wenn\
    \ wir zu lange warten, breitet sich die Dunkelheit aus. Die Bäume werden verdorren,\
    \ die Tiere werden aggressiv, und das Königreich wird ins Chaos stürzen.“  \n\n\
    Noah, der still hinter ihnen ging, hob die Hände leicht. „Ich habe in alten Schriften\
    \ gelesen, dass nur das Herz der Wächter das Ende des Fluchs brechen kann. Das\
    \ ist wahrscheinlich das Versprechen, das Rose gehört.“  \n\nJasper schlug seine\
    \ Hände zusammen, sein übliches Lächeln kehrte zurück, aber diesmal war es gemischt\
    \ mit Sorge. „Dann müssen wir das Versprechen finden und es erneuern! Wir dürfen\
    \ nicht zulassen, dass das Königreich leidet.“  \n\nViolet sah Jasper fest an.\
    \ „Du bist mutig, Jasper, und dein Enthusiasmus gibt uns Kraft. Aber sei vorsichtig.\
    \ Der Fluch wirkt nicht nur in der Ferne, er kann auch die Herzen der Menschen\
    \ vergiften. Wer an das Böse glaubt, wird schwächer.“  \n\nEin leises Heulen kam\
    \ aus dem Wald, als ein Schatten über die Bäume glitt. Das Geräusch ließ alle\
    \ erstarren. Die Gruppe spürte, wie die Luft kälter wurde.\n\n„Wir müssen zum\
    \ Weisen im Turm“, sagte Rose entschlossen. „Nur er kennt die genauen Worte des\
    \ alten Versprechens.“  \n\nViolet legte ihre Hand auf Jasper’s Schulter. „Du\
    \ wirst uns auf dem Weg führen, Jasper. Dein Mut wird uns schützen, aber du musst\
    \ auch aufpassen, nicht zu voreilig zu handeln.“  \n\nJasper nickte und fühlte\
    \ die Verantwortung in seiner Brust. „Ich verspreche, immer wachsam zu sein.“\
    \  \n\nDie vier setzten ihren Weg fort, nun mit dem Gewicht von Violet’s Warnung\
    \ im Herzen. Der Weg wurde schmaler, das Laub dichter, und das Flüstern des Waldes\
    \ schien ein altes Lied zu singen – ein Lied von Verheißungen und Flüchen. Rose\
    \ hielt den Anhänger fest, als würde er ihr Kraft geben. Noah sah aufmerksam die\
    \ Umgebung, bereit, jeden Hinweis zu erkennen.\n\nWährend sie tiefer in den Wald\
    \ eindrangen, spürten sie, wie ein leichter Nebel um sie herum wirbelte. Der Fluch\
    \ war nicht mehr nur ein Gerücht; er war ein greifbarer Schatten, der über das\
    \ Land schwebte. Doch mit jedem Schritt wuchs ihr Wille, das Versprechen zu erneuern\
    \ und Eldoria zu retten.  \n\nSo gingen sie weiter, das Herz des alten Fluchs\
    \ immer näher, und jedes ihrer Worte trug die Hoffnung, das Königreich von dem\
    \ dunklen Schicksal zu befreien."
  chapter_summary: "**Zusammenfassung (Deutsch, B1‑Niveau)**  \n\n- Der Himmel über\
    \ Eldoria ist trüb, ein kühler Wind weht aus dem verzauberten Wald.  \n- Die vier\
    \ Freunde (Rose, Violet, Jasper, Noah) verlassen den Marktplatz und gehen zum\
