  chapter_body: "**Chapitre 5 – La vérité en guise de cicatrice**\n\nLa pluie tapait\
    \ sans relâche contre les vitres du petit appartement de Mason, comme pour effacer\
    \ les traces d’une nuit trop longue. Les dossiers de Rose, étalés sur la table\
    \ bancale, formaient un labyrinthe d’encre et de photos jaunies. Au centre, le\
    \ porte‑documents contenant le diagramme des relations : Horizon Development,\
    \ Solaris, le compte offshore du Maire, les contrats gonflés, les fichiers de\
    \ surveillance. \n\nMason fixa la dernière photo : un écran de caméra de sécurité\
    \ affichant une allée sombre au port, où plusieurs camions portant le logo d’Horizon\
    \ étaient garés. Au bas de l’image, une silhouette massive – la même silhouette\
    \ que Millie avait projetée à l’entrée du Black Cat. Une lueur d’espoir se mêla\
    \ à la fatigue. S’il pouvait récupérer les données du serveur situé sous ce hangar,\
    \ il aurait enfin les preuves dont il avait besoin.\n\nIl glissa la vieille clé\
    \ en fer que le policier corrompu lui avait remise dans la poche de son manteau\
    \ usé, et se dirigea vers le quai. L’obscurité était épaisse, ponctuée par le\
    \ clignotement des néons rouillés. Le bruit des gouttes résonnait comme un tambour\
    \ de guerre.\n\n— « C’est ici que tout se joue, » se murmura‑t-il, bien que la\
    \ voix se perde dans le grondement lointain de la ville.\n\nEn glissant le pied\
    \ dans le premier camion, il découvrit un escalier de service menant à une salle\
    \ froide, remplie de rangées de serveurs grésillant. Son cœur battait à tout rompre\
    \ lorsqu’il connecta la petite clé USB à un port libre. Les écrans s’allumèrent,\
    \ dévoilant une série de transactions : transfert de plusieurs millions d’euros\
    \ du compte “Solaris‑01” vers une société écran basée aux îles Caïmans, où les\
    \ noms du Maire et du chef de la police spéciale figuraient en gras.\n\nMason\
    \ tapa frénétiquement, copiant les fichiers, quand une alarme stridente perça\
    \ le silence. Les lumières s’allumèrent d’un éclat blafard. Il sentit la présence\
    \ d’une silhouette derrière lui. La porte se fit brusquement et, dans l’encadrement,\
    \ la silhouette massive dont il se souvenait : Millie, les bras croisés, une arme\
    \ de poing à la main.\n\n— « Je t’ai dit de ne pas fouiner, » gronda‑t-elle, le\
    \ ton empreint d’une menace qui dépassait la simple violence. « Tu ne sais pas\
    \ à qui tu joues, Mason. »\n\n« Je ne peux pas laisser ces hommes s’en sortir, »\
    \ répondit‑il, la voix tremblante mais résolue. « Je veux seulement la vérité. »\n\
    \n« La vérité ? » Millie ricana, le regard dur comme la pierre du quai. « La vérité\
    \ a un prix, et tu ne peux pas l’offrir. »\n\nUn instant, leurs yeux se croisèrent,\
    \ chargé d’un passé que Mason ne connaissait pas. Millie abaissa son arme, mais\
    \ un coup de feu retentit soudain, éclatant contre le béton. Le bruit venait de\
    \ l’entrée du hangar : des hommes en uniforme, armés, entraient.\n\nDans la confusion,\
    \ Millie tira d’une main, poussant Mason hors de la salle. Un projectile ricocha\
    \ sur la clavicule de Mason, le faisant chanceler. Il sentit le sang couler, chaud,\
    \ et l’obscurité commencer à l’envahir. Il se releva, tenant fermement la clé\
    \ USB, la luisant comme une étincelle d’espoir dans la nuit.\n\n— « Je ne te laisserai\
    \ pas partir, » cria Millie, mais il était déjà trop tard. Il se bouscula contre\
    \ le mur, fit demi‑tour et courut vers la sortie, les hommes à ses trousses. La\
    \ pluie l’accueillit comme une douche glacée, lavant le sang qui s’échappait de\
    \ sa blessure.\n\nEssoufflé, il atteignit les rues sombres du quartier et, d’un\
    \ geste tremblant, frappa à la porte de Rose. Elle l’accueillit d’un sourire qui\
    \ ne cachait rien.\n\n— « Tu as ce que je veux, » dit‑elle en prenant la clé USB.\
    \ « Mais souviens‑toi, Mason, que chaque joueur finit par payer ses dettes. »\n\
    \nElle referma la porte derrière elle, laissant Mason, à genoux, saignant légèrement,\
    \ le souffle court. Une sirène de police retentit au loin, se rapprochant. Il\
    \ comprit alors que la ville l’avait déjà repéré comme un intrus.\n\nLe bruit\
    \ des pas s’accrut. Un groupe d’officiers, les insignes de la police spéciale\
    \ brillants, franchit le pas. L’un d’eux, le même qui lui avait remis la clé en\
    \ fer, s’avança.\n\n— « Mason, vous êtes en état d’arrestation pour intrusion,\
    \ violation de propriété et mise en danger d’autrui, » déclara l’officier d’une\
    \ voix clinique.\n\nMason leva les mains, le sang ruisselant sur les doigts. Il\
    \ jeta un dernier regard vers le ciel noir, où les éclairs de la tempête éclaboussaient\
    \ la ville comme des coups de tonnerre. Dans sa tête, les images du diagramme,\
    \ des comptes offshore, du Maire, de Millie, tourbillonnaient. La vérité était\
    \ désormais à portée de main, mais elle était entre les mains de Rose, et son\
    \ corps, son identité, sa liberté, étaient compromis.\n\nAlors qu’on le menottait,\
    \ il murmura à l’oreille de l’officier :\n\n— « Vous pensez m’avoir gagné, mais\
    \ la vérité a un moyen de sortir ; même du sang, elle se propage. »\n\nUn dernier\
    \ éclair zébra le ciel, et les gouttes de pluie se mêlèrent au sang sur le sol.\n\
    \nMason fut conduit dans le fourgon de police, les lumières clignotantes projetant\
    \ des ombres sur son visage pâle. La ville continuait de pleurer sous la pluie,\
    \ indifférente, tandis que le prix de la vérité se comptait désormais dans la\
    \ douleur d’un homme qui aurait tout perdu pour la dévoiler."
  chapter_summary: "**Notes de continuité – Chapitre 5 (B2 – Français)**  \n\n- **Mason**\
    \ cherche les preuves dans l’appartement, parcourt les dossiers de Rose ; le diagramme\
    \ montre les liens entre Horizon Development, Solaris, le compte offshore du Maire\
    \ et des contrats gonflés.  \n- Une photo de caméras de sécurité révèle des camions\
    \ Horizon au port et la silhouette massive qui correspond à **Millie**.  \n- Décidé\
    \ à récupérer les données, Mason prend la vieille clé en fer donnée par le policier\
    \ corrompu et se rend au hangar du port sous la pluie.  \n- Il trouve un escalier\
    \ de service, une salle de serveurs et connecte sa clé USB. Les écrans affichent\
    \ des transferts de plusieurs millions d’euros du compte “Solaris‑01” vers une\
    \ société écran aux îles Caïmans, avec le Maire et le chef de la police spéciale\
    \ comme bénéficiaires.  \n- Une alarme se déclenche, les lumières s’allument.\
    \ **Millie** apparaît, arme au poing, le menace et l’accuse de jouer avec le mauvais\
    \ camp.  \n- Un coup de feu retentit à l’entrée : des hommes en uniforme de la\
    \ police spéciale envahissent le hangar.  \n- Dans la confusion, Millie pousse\
    \ Mason hors de la salle ; il est touché à la clavicule, saigne, mais garde la\
    \ clé USB.  \n- Mason s’échappe sous la pluie, court jusqu’à la porte de **Rose**,\
    \ qui l’accueille avec un sourire. Elle prend la clé USB, rappelle que chaque\
    \ joueur finit par payer ses dettes.  \n- Une sirène de police se rapproche ;\
    \ une équipe de la police spéciale, dont l’officier qui a remis la clé en fer,\
    \ arrive.  \n- L’officier arrête Mason (intrusion, violation de propriété, mise\
    \ en danger), il lève les mains, le sang coule sur ses doigts.  \n- Dernier dialogue\
    \ de Mason : il promet que la vérité « se propagera », même du sang.  \n- Mason\
    \ est menotté, mis dans le fourgon de police tandis que la ville continue de pleuvoir.\
    \  \n\n**Tensions non résolues / Questions pour le prochain chapitre**  \n1. Rose\
    \ possède la clé USB contenant les preuves ; quels seront ses prochains mouvements ?\
    \  \n2. Le Maire et la police spéciale sont exposés ; comment réagiront‑ils face\
    \ à la fuite possible des informations ?  \n3. Millie a laissé Mason s’échapper ;\
    \ pourquoi ? a‑t‑elle un plan caché ?  \n4. Mason est en détention ; pourra‑t‑il\
    \ faire sortir la vérité de l’intérieur du système ?  \n5. La pluie et le climat\
    \ sombre renforcent l’ambiance oppressante ; la ville semble prête à écraser le\
    \ dissentiment.  \n\n**État final du protagoniste**  \n- Mason est arrêté, blessé,\
    \ sans liberté, mais il détient la preuve (clé USB) qui est maintenant entre les\
    \ mains de Rose.  \n- La vérité est en jeu, mais son accès dépendra des actions\
    \ futures de Rose, Millie et des autorités corrompues."
