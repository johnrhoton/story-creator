  chapter_description: Political tensions complicate the investigation.
  chapter_body: "**Kapitel 2 – Politiska spänningar komplicerar undersökningen**\n\
    \nMaisie vaknar tidigt igen. Hon har den rostiga nyckeln i fickan. Hon går ut\
    \ på den grusiga vägen. Gatorna är tysta men fulla av människor.\n\nI en del av\
    \ staden ser hon stora hus. I de stora husen bor rika män och kvinnor. De har\
    \ fina kläder och blåa mantlar. I en annan del ser hon smutsiga gränder. Där bor\
    \ fattiga familjer. De har trasiga rockar och kalla händer.\n\nPå torget hänger\
    \ två banderoller. En banderoll säger **“Rättvisa för alla”**. Den andra banderollen\
    \ säger **“Starkare makt”**. Folk ropar och pekar på varandra. Rösterna blir högre.\
    \ En ung man ropar: *“Vi vill ha mat!”* En äldre dam svarar: *“Vi vill ha fred!”*\
    \ \n\nMaisie känner spänning i luften. Hon ser Isabelle vid en bänk. Isabelle\
    \ håller i papperet med meddelandet *“Möt mig i skuggan”*. Isabelle ser orolig\
    \ ut.\n\n– *“Vad händer?”* frågar Maisie.\n\n– *“Staden är delad,”* svarar Isabelle.\
    \ *“Rik och fattig slåss. Ingen vill prata om Vinnie.”* \n\nPlötsligt hörs steg.\
    \ Noah kommer fram. Han har sin långa skugga bakom sig.\n\n– *“Det är farligt\
    \ att gå runt nu,”* säger Noah. *“När politiken är het kan folk se er som fiender.”*\
    \ \n\nMaisie nickar. Hon visar nyckeln för Noah.\n\n– *“Jag tror att nyckeln öppnar\
    \ något viktigt,”* säger hon. *“Men vi måste vara försiktiga.”* \n\nNoah pekar\
    \ mot stadshuset. Det är en stor byggnad med höga portar. En vakt står vid dörren.\
    \ Vakten har en röd cape och en stjärnformad medaljong.\n\n– *“Ingen får gå in\
    \ utan tillstånd,”* säger vakten. *“Staden är i uppror. Alla dörrar är låsta.”*\
    \ \n\nIsabelle tittar på papperet igen. Hon ser en liten teckning på sidan. På\
    \ teckningen finns en dold dörr bakom en tavla.\n\n– *“Kanske finns en hemlig\
    \ ingång,”* säger Isabelle. *“Vi kan leta där.”* \n\nMaisie känner en kall vind\
    \ i ryggen. Hon tror att en osynlig kraft drar dem mot hemligheten. Hon tar ett\
    \ djupt andetag.\n\n– *“Vi går tillsammans,”* säger hon bestämt. *“Politiska bråk\
    \ får inte stoppa sanningen.”* \n\nDe tre går mot stadshusets bakväg. Människor\
    \ ser på dem med misstänksamma blickar. En grupp soldater marscherar förbi. Deras\
    \ svärd blänker i morgonljuset.\n\nNär de kommer fram hör de en duns. En gammal\
    \ tavla faller ner från väggen. Bakom tavlan finns en liten öppning. En kall,\
    \ mörk tunnel syns.\n\n– *“Det kan vara där nyckeln passar,”* säger Maisie och\
    \ tar fram den rostiga nyckeln. \n\nDe stannar en stund. Stadens ljud blir tystare.\
    \ Spänningen är stor. Maisie vet att politiken gör vägen svår, men hon är fast\
    \ besluten.\n\n– *“Vi fortsätter,”* säger hon. *“Vi måste hitta Vinnie.”* \n\n\
    Kapitel slutar med att de alla sänker huvudet och går ner i den mörka öppningen.\
    \ Lüften känns kall, men deras vilja är stark."
