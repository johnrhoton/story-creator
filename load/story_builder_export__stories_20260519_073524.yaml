  chapter_body: "**Chapitre 3 – Le conseil de William**\n\nLa pluie continuait de\
    \ marteler les rues, chaque goutte résonnant comme un rappel sourd du poids qui\
    \ s’accumulait dans la ville. À l’intérieur du « Black Cat », la fumée des cigarettes\
    \ dessinait des spirales paresseuses au-dessus des verres ternis. Le crépitement\
    \ d’un vieux juke‑box jouait un blues grinçant, tandis que le bourdonnement des\
    \ clients masquait les pensées qui tourbillonnaient dans la tête de Mason.\n\n\
    Mason était installé à une table du fond, les papiers de Rose étalés devant lui\
    \ comme un puzzle incomplète. Un café depuis longtemps froid reposait à côté d’un\
    \ cahier griffonné aux marges tachées d’encre. Son regard parcourait les noms\
    \ et les chiffres : **Horizon Development**, les montants gonflés, les sociétés\
    \ écrans. Chaque ligne semblait attiser le feu d’une vérité trop dangereuse pour\
    \ être dévoilée.\n\nÀ la porte du bar, Millie restait immobile, son silhouette\
    \ massive encadrée par le néon pâle. Elle observait, les bras croisés, comme si\
    \ elle attendait un signal. Rose, assise au comptoir, sirotait un whisky noir,\
    \ ses yeux perçant la foule, évaluant chaque mouvement. L’atmosphère était déjà\
    \ saturée de tension lorsqu’une silhouette familière fit irruption dans le brouillard\
    \ de la porte : William.\n\nLe visage de William était marqué par des cicatrices\
    \ qui semblaient raconter des histoires que le temps n’avait pas su effacer. Malgré\
    \ son allure imposante, ses pas étaient lents, calculés. Il s’avança directement\
    \ vers la table de Mason, jeta un regard furtif à Millie, puis s’assit en face\
    \ de lui, les mains jointes autour d’un verre de bourbon.\n\n« Mason, » dit William\
    \ d’une voix rauque, presque un murmure qui se perdit dans le vacarme du bar.\
    \ « Je sais ce que tu fouilles. »\n\nMason leva les yeux, surpris. « Tu sais ? »\n\
    \nWilliam sourit, un sourire qui ne touchait pas les yeux. « J’ai vu assez de\
    \ choses pour reconnaître les ombres quand elles s’allongent. » Il posa son verre\
    \ sur la table, faisant claquer le liquide noir contre le bois usé. « Ce que Rose\
    \ t’a donné… ce n’est pas juste une enquête ordinaire. Ce sont des pièces d’un\
    \ puzzle qui, une fois assemblé, expose des hommes qui ne laissent jamais tomber\
    \ leurs intérêts. »\n\nMason serra les dents, la gorge sèche. « Et Millie ? Elle…\
    \ elle cherchait quelqu’un. »\n\nWilliam croisa les bras, son regard s’attardant\
    \ sur la porte où Millie restait en retrait. « Millie n’est pas une victime. C’est\
    \ une garde‑frontière. Elle protège… quelque chose que tu ne comprends pas encore. »\n\
    \nUn silence pesant s’installa, ponctué seulement par le cliquetis du verre et\
    \ le tintement de la pluie contre les fenêtres.\n\n« Tu devrais abandonner, Mason, »\
    \ continua William, plus ferme. « Ce que tu fouilles ne concerne pas seulement\
    \ des comptes et des contrats. Il y a des hommes qui commandent les politiciens,\
    \ des chefs de bande qui utilisent la police comme un moyen de pression. Si tu\
    \ t’enfonces davantage, ils ne laisseront pas le jeu se terminer sans faire payer\
    \ le perdant. »\n\nMason sentit une vague de colère mêlée à la peur. « Pourquoi\
    \ me prévenir ? Pourquoi moi ? »\n\nLe vieil homme inspira profondément, sentant\
    \ l’odeur rance du tabac et du cuir. « Parce que, autrefois, je pensais que la\
    \ justice était un chemin clair. J’ai vu des gens comme toi : intelligents, curieux,\
    \ mais trop confiants. J’ai perdu des amis à cause de cette même confiance. Je\
    \ ne veux pas que tu deviennes… un autre chiffre dans leurs dossiers. »\n\nUn\
    \ frisson parcourut l’échine de Mason. Il repensa à la carte de visite de Rose,\
    \ aux noms de sociétés écrans, à la facture gonflée d’Horizon Development qui\
    \ venait de surgir. Chaque indice semblait désormais un fil tendu vers un piège\
    \ mortel.\n\n« Et si je refuse, » demanda-t-il, la voix légèrement tremblante.\
    \ « Si je continue ? »\n\nWilliam fixa le verre, comme s’il cherchait une réponse\
    \ dans le liquide sombre. « Alors prépare-toi à perdre plus que de l’argent. La\
    \ ville ne respecte pas les curieux. Elle les avale. »\n\nÀ cet instant, la porte\
    \ du bar s’ouvrit à nouveau. Millie entra, ses yeux d’acier cherchant William,\
    \ puis Mason. Sans dire un mot, elle s’avança, posa une main ferme sur l’épaule\
    \ de Mason, et, d’un souffle, murmura :\n\n« Si tu continues, tu ne seras plus\
    \ seul. »\n\nLe regard de William se durcit. Il se leva, la chaise grinça contre\
    \ le parquet, et, d’une voix basse, conclut :\n\n« Réfléchis bien, Mason. Le prix\
    \ de la vérité est parfois une vie. »\n\nIl quitta le bar aussi silencieusement\
    \ qu’il était venu, laissant derrière lui le cliquetis du verre, le grondement\
    \ de la pluie, et un Mason qui, pour la première fois depuis ce soir, ressentait\
    \ le vrai poids du choix qui l’attendait. \n\nLe rideau s’abattait sur le « Black Cat »,\
    \ mais la vraie scène se jouait désormais dans les ruelles sombres de la ville,\
    \ où chaque pas pouvait devenir la dernière pièce d’un jeu déjà perdu."
  chapter_summary: "**Notes de continuité – Chapitre 3 (B2, français)**  \n\n- **Ambiance** :\
