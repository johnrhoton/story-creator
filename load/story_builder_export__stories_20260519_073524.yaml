  chapter_description: Establish the setting and introduce the characters.
  chapter_body: 'Staden är gammal och stor. Den är huvudstad i ett land med många
    klasskillnader. På ena sidan finns lyxiga herrgårdar med gröna trädgårdar. På
    andra sidan finns trånga gränder med slitna hus. Folk i staden är ofta arga och
    rädda. Det finns också hemliga sällskap som möts i mörka källare. Atmosfären är
    tjock och tyst.


    Maisie går längs en grusväg. Hon har starka armar och en tränad kropp. Hon har
    bruna ögon som ser noga på allt. På hennes händer finns ärr. Hon bär enkel kläder
    – slitna jeans och en gammal tröja. Hon talar med en sarkastisk röst. Maisie litar
    inte på enkla svar. Hon tror att någon gömmer sanningen.


    Vinnie sitter på en sten nära en fontän. Han har ett vitt- och silvergrått skägg.
    Hans ögon är blå som himlen. Vinnies ansikte är rynkigt av år i solen. Han är
    lugn och vänlig. Han hjälper gärna människor. Vinnie tror på gott i alla människor.
    Han ser alltid möjlighet att hjälpa.


    Isabelle går med mjuka steg. Hon är ung och har en liten kropp. Hennes ansikte
    är mjukt och hon ler ofta. Hon har ett skarpt sinne och tänker snabbt. Isabelle
    vill lyckas och vill ha makt. Hon är ambitiös och räknar alltid sina drag. Hon
    är också charmig och får folk att känna sig trygga.


    Noah står i skuggan av en gammal byggnad. Han är mycket hög och muskulös. Hans
    röst är djupt och allvarligt. Han tittar tyst på folk och analyserar dem. Noah
    är skeptisk och tror inte på ytliga svar. Han har ett torrt skämt ibland, men
    han visar sällan sina känslor. Hans stora kropp är ett skydd mot världen.


    Alla fyra personer rör sig i staden på samma dag. De känner varandra men vet inte
    vad som kommer att hända. Det finns spänning i luften, och någon osynlig kraft
    drar dem mot en hemlighet. Stadens gator väntar på att deras berättelse ska börja.  '
  chapter_summary: "**Kapitel‑sammanfattning (Svenska, A1)**  \n\n- Staden är stor\
    \ och gammal. Det finns fina hus och fattiga gränder. Folk är arga och rädda.\
    \  \n- Maisie går på en grusväg. Hon har starka armar, bruna ögon och ärr på händerna.\
    \ Hon har slitna jeans och en gammal tröja. Hon talar sarkastiskt och tror att\
    \ någon döljer sanningen.  \n- Vinnie sitter på en sten vid en fontän. Han har\
    \ vitt och silvergrått skägg, blå ögon och rynkor. Han är lugn, vänlig och vill\
    \ hjälpa folk.  \n- Isabelle går mjukt. Hon är ung, liten och har ett leende.\
    \ Hon är smart, ambitiös och vill ha makt. Hon får andra att känna sig trygga.\
    \  \n- Noah står i skuggan av en gammal byggnad. Han är hög, muskulös och har\
    \ djup röst. Han tittar tyst på folk, tror inte på ytliga svar och visar sällan\
    \ känslor.  \n- Alla fyra rör sig i staden samma dag. De känner varandra men vet\
    \ inte vad som kommer att hända. En osynlig kraft drar dem mot en hemlighet. \
    \ \n- Spänning finns i luften. Kapitel slutar med att gatorna väntar på deras\
    \ berättelse.  "
