  chapter_description: Maisie begins investigating Vinnie's sudden disappearance.
  chapter_body: "Maisie vaknade tidigt. Solen var svag. Gatorna i staden var tysta.\
    \ Hon gick mot fontänen där Vinnie alltid satt. \n\nNär hon kom fram var platsen\
    \ tom. Stenen var kall. Vinnie var borta. En ensam bänk stod vid sidan. En liten\
    \ låda låg på bänken. \n\nMaisie öppnade lådan. Inuti fanns en bit papper. På\
    \ pappret stod “Möt mig i skuggan”. Handen på pappret var blöt. \n\nHon såg runt.\
    \ En gammal kvinna stod i skuggan. Kvinnan tittade på Maisie. \n\n– Vem är du?\
    \ frågade Maisie. \n\nKvinnan svarade tyst. Hon pekade mot den mörka gränden.\
    \ \n\nMaisie följde pekandet. Gången var smal och ful. På väggen hängde en trasig\
    \ tavla. Tavlan visade en bild av Vinnie vid fontänen. \n\nSamtidigt hörde Maisie\
    \ en röst bakom sig. Det var Isabelle. \n\n– Vad gör du här? frågade Isabelle.\
    \ \n\n– Jag letar efter Vinnie, svarade Maisie utan att le. \n\nIsabelle såg på\
    \ pappret. Hon nickade. \n\n– Vi måste prata med Noah. Han vet mer om vad som\
    \ händer i staden, sa hon. \n\nMaisie och Isabelle gick till den stora byggnaden\
    \ där Noah stod i skuggan. Noah såg på dem med sina djupa ögon. \n\n– Vad vill\
    \ ni? frågade han. \n\n– Vinnie är försvunnen. Vi har ett meddelande, sa Maisie.\
    \ \n\nNoah tog pappret. Han läste snabbt. \n\n– Det här är farligt, sa han. Men\
    \ jag kan hjälpa er. \n\nDe tre personer gick tillbaka till fontänen. Maisie kände\
    \ en kall vind. Hon såg en liten nyckel ligga på marken. \n\nHon plockade upp\
    \ nyckeln. Den var gammal och rostig. \n\n– Det är början på något, tänkte hon.\
    \ \n\nMaisie gick hem med nyckeln i sin ficka. Hon bestämde sig för att fortsätta\
    \ undersöka. Gatorna väntade på svaret. \n\nSlutet på dagen lämnade en mörk känsla\
    \ i luften. Men Maisie var fast besluten. Hon skulle hitta sanningen om Vinnies\
    \ försvinnande."
