    \ ist.  \n- Violet zeigt ein altes Pergament mit dem gleichen Symbol wie Roses\
    \ Anhänger.  \n  - Sie behauptet, das sei das „wahre Herz der Wächter“ und kann\
    \ den Fluch allein brechen.  \n- Noah warnt: Das Herz kann den Nutzer verschlingen,\
    \ wenn er zu gierig ist.  \n\n**Ereignis**  \n- Ein großer Baumstamm fällt, blockiert\
    \ den Weg und wirft Schatten.  \n- Violet legt das Pergament auf den Kristall.\
    \  \n- Ein bläulicher Funken springt vom Kristall zum Pergament und trifft Roses\
    \ Anhänger.  \n- Rose hat sofort starke Schmerzen, fällt zu Boden, verliert den\
    \ Griff am Kristall.  \n\n**Emotionen**  \n- Rose schreit: „Nein!“, Tränen.  \n\
    - Jasper ruft verzweifelt, aber seine Stimme hallt schwach.  \n- Violet schiebt\
    \ Noah zurück, sagt kalt, dass der Fluch um jeden Preis beendet werden muss. \
    \ \n\n**Folgen**  \n- Das Licht des Kristalls erlischt, ein dunkler Nebel (der\
    \ Fluch) steigt auf.  \n- Rose flüstert: „Du hast uns verraten.“  \n- Violet nimmt\
    \ das Pergament, verlässt die Gruppe und verschwindet im Wald.  \n\n**Offene Spannungen**\
    \  \n- Noah ist wütend und verzweifelt, will das Herz zurückholen, weiß aber nicht,\
    \ ob er Violet noch vertrauen kann.  \n- Jasper und Rose entscheiden, den Fluch\
    \ ohne das Herz zu brechen.  \n- Der Kristall hat noch einen kleinen Funken; das\
    \ Versprechen der Wächter lebt weiter.  \n\n**Endzustand des Kapitels**  \n- Gruppe\
    \ besteht jetzt aus Jasper, Rose und Noah.  \n- Sie setzen den Weg zum Turm fort,\
    \ dichter Nebel und seltsame Geräusche umgeben sie.  \n- Jeder ist entschlossen,\
    \ Eldoria zu retten, obwohl das Vertrauen beschädigt ist und Violet fehlt.  \n\
    - Der Turm ist sichtbar im Nebel; das Versprechen ist noch nicht verloren.  "
