  chapter_body: "Le néon du « Black Cat » clignotait faiblement, projetant des éclats\
    \ verts sur le parquet collant. La pluie, toujours aussi persistante, martelait\
    \ les vitres, transformant la petite salle en une cage de verre où chaque respiration\
    \ semblait vibrer sous la tension. \n\nMason était installé dans un coin sombre,\
    \ entouré d’une pile de dossiers, de factures gonflées et de cartes de visite\
    \ froissées. La lumière jaunâtre du plafond révélait ses yeux cernés, qui parcouraient\
    \ sans relâche les tableaux Excel imprimés sur des feuilles jaunies. Au fond,\
    \ le juke‑box grinçait encore de vieux airs de jazz, une bande‑son qui semblait\
    \ appartenir à un autre temps.\n\nRose s’approcha, son pas mesuré résonnant sur\
    \ le plancher comme un métronome. Elle tenait un petit porte‑documents en cuir,\
    \ usé aux coins, et le posa sur la table avec une précision clinique. Ses doigts,\
    \ marqués de cicatrices, glissèrent sur la couverture avant de s’arrêter sur la\
    \ première page.\n\n« Vous avez vu ce que Horizon Development manipule, » dit‑elle,\
    \ la voix basse, presque un murmure qui s’élevait au-dessus du brouhaha. « Mais\
    \ il y a quelque chose que vous n’avez pas encore relié. »\n\nMason leva les yeux,\
    \ la gorge serrée. « Quelque chose ? »\n\nRose ouvrit le porte‑documents, révélant\
    \ un diagramme dessiné à la main. Les lignes reliaient des noms – « Horizon Development »,\
    \ « Bureau du Maire », « Société Solaris », « Millie » – à des points d’intersection\
    \ qui formaient une toile d’araignée.\n\n« Regardez, » dit‑elle, pointant du doigt\
    \ une case au centre. « Solaris n’est pas qu’une société écran. C’est une filiale\
    \ de Horizon, mais elle possède aussi une licence d’exploitation du port, et —\
    \ voici le lien qui vous avait échappé — les fonds qui financent les opérations\
    \ de la police spéciale proviennent d’un compte bancaire géré par le bureau du\
    \ Maire. »\n\nMason sentit son cœur s’accélérer. Il connaissait déjà Horizon et\
    \ ses factures gonflées, mais il n’avait jamais suspecté une liaison directe avec\
    \ la mairie. Il parcourut du regard les lignes qui convergeaient vers le nom de\
    \ Millie.\n\n« Millie ? » répéta‑t-il, incrédule. « Pourquoi son nom apparaît\
    \ ici ? »\n\nRose esquissa un sourire qui ne toucha pas ses yeux. « Millie n’est\
    \ pas seulement une garde‑frontière. Elle est l’architecte de la sécurité du réseau.\
    \ Chaque fois que vous avez vu des caméras désactivées dans les entrepôts de Horizon,\
    \ c’est elle qui a tiré les ficelles. Elle protège les livraisons, assure que\
    \ les paiements arrivent sans heurts. En échange, le Maire lui accorde l’immunité\
    \ – et un petit pourcentage des profits. »\n\nMason se tourna vers la porte, comme\
    \ s’il s’attendait à voir arriver un homme en costume, une menace en uniforme.\
    \ La porte resta close, les battements de la pluie continuant leur cadence monotone.\n\
    \n« Et Clara ? » demanda‑t-il, la voix se faisant plus aiguë. « Comment s’insère‑elle\
    \ dans tout ça ? »\n\nRose fit glisser une photo de Clara Dubois, le visage pâle,\
    \ les yeux fuyants, sous le diagramme. « Clara a découvert le compte offshore\
    \ du Maire, celui qui alimentait les caisses de la police spéciale. Elle a laissé\
    \ des traces dans ses audits, des anomalies que vous avez déjà repérées. Quand\
    \ elle a tenté de les exposer, Horizon a ordonné son enlèvement. Le Maire a été\
    \ informé, mais il n’a pas pu intervenir sans mettre en péril son propre empire. »\n\
    \nMason sentit la colère monter, un mélange d’indignation et de culpabilité. « Vous\
    \ avez gardé tout ça pour vous ? »\n\nRose se pencha, ses lèvres se tirant légèrement.\
    \ « Pas exactement. Je travaille pour le même client qui vous a engagé, mais je\
    \ ne suis pas du même côté. Mon patron veut que l’on élimine les pièces qui ne\
    \ servent plus… « Elle fit une pause, scrutant le visage de Mason, cherchant à\
    \ mesurer son engagement. « Vous pouvez soit pousser le bouchon, soit nous laisser\
    \ tomber. Si vous exposez le Maire, la police spéciale vous épongera. Si vous\
    \ arrêtez, vous devenez une pièce de plus sur l’échiquier. »\n\nMason joua nerveusement\
    \ avec le bord de son verre, sentant le poids du liquide froid contre ses paumes.\
    \ La tension dans la pièce était palpable, chaque goutte qui s’écrasait sur le\
    \ verre ressemblait à un compte‑à‑rebours.\n\n« Tu ne penses pas que tu joues\
    \ à Dieu, Rose ? » murmura‑t-il. « Tu crois pouvoir garder le contrôle ? »\n\n\
    Rose leva les yeux, son regard perçant traversant le brouillard de nicotine qui\
    \ flottait autour d’elles. « Je ne joue pas à Dieu. Je joue à la survie. Dans\
    \ cette ville, les hommes qui commandent les politiciens ne veulent que deux choses :\
    \ l’argent et le silence. Si vous brisez l’un, l’autre s’effondre. »\n\nUn souffle\
    \ de vent fit claquer la porte du bar, entraînant avec lui un souffle de pluie\
    \ qui s’insinua sous la porte, mouillant le sol et projetant des reflets éclatés.\
    \ Millie, qui était restée immobile près du comptoir, s’avança lentement, sa silhouette\
    \ massive découpée par la lumière vacillante.\n\n« Mason, » dit‑elle d’une voix\
    \ rauque, « je ne suis pas ici pour être votre alliée ou votre ennemie. Je suis\
    \ ici pour protéger ce que je dois protéger. Si vous continuez, vous allez toucher\
    \ à une partie de la ville que même le Maire préfère ne pas voir. »\n\nRose hocha\
    \ la tête, comme si cela confirmait ses propos. « C’est exactement ce que je voulais\
    \ dire. Vous voyez, chaque suspect n’est qu’une facette d’un même mécanisme. Horizon,\
    \ le Maire, Solaris, Millie… Tous font tourner la même roue. La roue s’arrête\
    \ seulement quand quelqu’un en prend le contrôle ou la détruise. »\n\nMason sentit\
    \ les pièces du puzzle s’assembler, mais un vide persistait dans son esprit. « Et\
    \ si je choisis de détruire la roue ? »\n\nUne légère rire s’échappa de Rose,\
    \ presque dépourvu d’émotion. « Alors vous serez le premier à connaître le goût\
    \ du danger, et le dernier à comprendre la vraie nature de la liberté. »\n\nLe\
    \ juke‑box grésilla une dernière note avant de s’éteindre, laissant le bar dans\
    \ un silence lourd. Mason se redressa, les épaules crispées, et regarda les visages\
    \ autour de lui. Il voyait maintenant la ville sous un angle différent : un réseau\
    \ d’intérêts entremêlés où chaque décision entraînait des répercussions mortelles.\n\
    \nIl prit le porte‑documents, le sentit contre sa paume, comme un poids que l’on\
    \ ne pouvait plus laisser de côté. « Très bien, » déclara‑t-il d’une voix plus\
    \ ferme. « Je sais qui je protège. »\n\nRose hocha la tête, reconnaissant un éclat\
    \ de détermination dans ses yeux. Millie resta immobile, son bras croisé, prête\
    \ à intervenir si la situation dégénérait. La pluie continuait de marteler le\
    \ verre, comme un rappel que la ville ne dormait jamais.\n\nMason se leva, ajusta\
    \ son manteau trempé et, d’une dernière fois, fixa le diagramme. Il savait que\
    \ chaque ligne était une porte vers un danger plus grand, mais il avait désormais\
    \ la clé pour l’ouvrir. Dans le brouillard qui s’épaississait à l’extérieur, il\
    \ s’engagea sur le chemin qui le mènerait, que ce soit vers la vérité ou vers\
    \ sa propre perte."
  chapter_summary: "**Notes de continuité – Chapitre ?**\n\n- **Lieu :** Bar « Black\
    \ Cat », nuit pluvieuse, atmosphère étouffante.  \n- **Personnages présents :**\
    \ Mason (enquêteur), Rose (informante), Millie (garde‑frontière), Clara (défunte),\
    \ mention du Maire, de Horizon Development et de Solaris.  \n\n**Événements clés**\
    \  \n1. Rose apporte un porte‑documents contenant un diagramme de relations. \
    \ \n2. Diagramme montre : Horizon → Solaris (filiale) → licence portuaire ; compte\
    \ bancaire du Maire finance la police spéciale.  \n3. Millie identifiée comme\
    \ « architecte de la sécurité du réseau », bénéficiaire d’immunité du Maire. \
    \ \n4. Photo de Clara : elle a découvert le compte offshore du Maire, a laissé\
    \ des traces dans ses audits, a été enlevée sur ordre d’Horizon.  \n5. Rose révèle\
    \ son double jeu : travaille pour le même client que Mason mais suit un autre\
    \ agenda. Elle propose deux options à Mason – exposer le Maire (risque de représailles)\
    \ ou abandonner (devenir pion).  \n\n**Décisions / changements émotionnels** \
    \ \n- Mason passe de la confusion à la colère, puis à une détermination nouvelle.\
    \  \n- Rose reste froide, se justifie par la survie.  \n- Millie intervient, se\
    \ positionne neutre mais menace de protéger ses intérêts.  \n\n**Informations\
    \ révélées**  \n- Le Maire finance la police spéciale via un compte géré par son\
    \ bureau.  \n- Solaris n’est pas juste une façade, elle détient la licence portuaire.\
    \  \n- Millie reçoit un pourcentage des profits et l’immunité.  \n- Clara était\
    \ la première à mettre au jour le scandale financier.  \n\n**Tensions non résolues**\
    \  \n- Le choix de Mason : poursuivre l’enquête au risque d’être éliminé ou reculer.\
    \  \n- La véritable allégeance de Rose (qui veut « éliminer les pièces… »).  \n\
    - La réaction probable de la police spéciale et du Maire si Mason expose les faits.\
    \  \n- Le rôle futur de Millie – alliée ou antagoniste selon les actions de Mason.\
    \  \n\n**État final du chapitre**  \n- Mason saisit le porte‑documents, accepte\
    \ tacitement de continuer malgré le danger.  \n- Rose hoche la tête, reconnaît\
    \ la détermination de Mason.  \n- Millie reste sur le qui-vive, prête à intervenir.\
    \  \n- La pluie continue de marteler le verre, symbole d’une ville qui ne dort\
    \ jamais.  \n- Mason quitte le bar, porte‑documents en main, conscient que chaque\
    \ ligne du diagramme ouvre une nouvelle porte de danger.  \n\n*Ces points servent\
    \ de base pour le prochain chapitre : développer la décision de Mason, explorer\
    \ les conséquences auprès du Maire et de la police spéciale, et approfondir les\
    \ rapports avec Rose et Millie.*"
