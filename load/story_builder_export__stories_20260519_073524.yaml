  chapter_description: Isabelle uncovers hidden documents tied to a secret society.
  chapter_body: "**Kapitel 3 – Isabelle hittar hemliga papper**\n\nNatten var mörk.\
    \ Vägen ner i tunneln var kall. Maisie, Isabelle och Noah gick långsamt. De hade\
    \ den rostiga nyckeln i fickan. Deras hjärtan slog snabbt.\n\nIsabelle hörde ett\
    \ svagt ljud. Det lät som papper som prasslade. Hon pekade på en gammal vägg.\
    \ ”Här är något,” sade hon.\n\nDe stannade. Ila‑ljuset från deras ficklampa visade\
    \ ett litet hål i väggen. Ett litet papper stack ut. Isabelle böjde sig ner. Hon\
    \ tog försiktigt fram papperet.\n\nDet var en gammal bok. På omslaget stod stora\
    \ bokstäver: **“Skuggornas råd”.** Boken var dammig. Isabelle öppnade den långsamt.\
    \ Inuti fanns flera dokument. Det fanns kartor och listor. Det fanns också namn\
    \ på människor.\n\nIsabelle läste högt: ”*Vi är en hemlig förening. Vi vill styra\
    \ staden från mörkret.*” Hon såg på Maisie och Noah. Alla såg oroliga ut.\n\n\
    Noah tog ett dokument. Han tittade på det. ”Det här är farligt,” sa han. ”Det\
    \ betyder att någon i staden vill dölja sanningen.”\n\nMaisie höjde ögonbrynen.\
    \ ”Vem är Vinnie?” frågade hon. Isabelle svarade: ”Jag tror att Vinnie såg dessa\
    \ papper innan han försvann. Han kanske var i kontakt med dem.”\n\nIsabelle plockade\
    \ ur en annan roll. På den stod datum. Det var i går. Papperet var fortfarande\
    \ färskt. Det stod: **“Möt mig i skuggan vid fontänen. – V”.** Isabelle pekade\
    \ på bokstaven V. ”Det kan vara Vinnies signatur,” sa hon.\n\nLjudet av fotsteg\
    \ hördes ovanför. Det var en vakt. Vakter gick förbi den stora byggnaden. De ropade:\
    \ ”Ingen får gå in utan tillstånd!” Men Isabelle och hennes vänner var redan i\
    \ tunneln. De var i säkerhet.\n\nIsabelle bläddrade i boken. Hon hittade en karta\
    \ över staden. På kartan var en röd prick. Det var en plats bakom stadshuset.\
    \ ”Det här är deras gömställe,” sa hon. ”Vi måste gå dit.”\n\nNoah rörde på armen.\
    \ ”Vi har nyckeln. Vi kan öppna dörren.” Alla nickade. De reste sig upp. Det kalla\
    \ luften i tunneln gjorde dem rysa.\n\nDe gick tillbaka mot ingången. Isabelle\
    \ höll boken i handen. Hon kände att hon hade hittat en ledtråd. ”Vi är närmare\
    \ sanningen,” sade hon. ”Vi måste vara försiktiga. Politiska makter ser på oss.”\n\
    \nMaisie tog nyckeln ur fickan. Hon satte in den i låset som de såg på väggen.\
    \ Låset klickade. Dörren öppnades sakta. Ett mörkt rum låg bakom. Inuti fanns\
    \ fler papper och en stor bild av en gammal kappa. På kappan stod en symbol: en\
    \ krona med en orm.\n\nNoah fläktade upp en gammal bok. ”Det här är en gammal\
    \ hemlig kod. Den hör till en hemlig sällskap. Kanske *Skuggornas råd*,” sa han.\n\
    \nIsabelle såg på de andra. ”Vi måste ta med oss pappren. De bevisar att någon\
    \ döljer sanningen om Vinnie och om staden.” Alla gick med på det.\n\nDe samlade\
    \ så mycket som de kunde. De la papprena i en väska. När de gick ut hördes återigen\
    \ ljudet av fyrverkerier från torget. Folk ropade: ”Rättvisa för alla!” och ”Starkare\
    \ makt!” Det var politiska banderoller överallt.\n\nIsabelle stirrade på stadens\
    \ ljus genom den öppna dörren. ”Vi är mitt i ett spel,” tänkte hon. ”Men vi har\
    \ bevis.” Hon såg på Maisie. ”Vi måste vara modiga.” \n\nDe steg ut ur tunneln.\
    \ Kylan i natten slog mot deras ansikten. Men i deras händer låg pappren som kunde\
    \ förändra staden. De gick mot ljuset, mot stadens centrum, med en ny plan.\n\n\
    **Slutet på Kapitel 3.**"
