  chapter_description: Evidence connects the case to organised crime and political
    corruption.
  chapter_body: 'La pluie continuait de tambouriner sur le verre sale du "Black Cat",
    un rythme monocorde qui se fondait dans le brouhaha sourd des conversations et
    le cliquetis des verres. Mason, une pile de papiers brouillons et une tasse de
    café froid à portée de main, tentait de donner un sens aux informations fragmentaires
    que Rose lui avait fournies. Une jeune femme disparue. Des gens peu recommandables.
    Beaucoup d''argent. Des éléments qui, juxtaposés, commençaient à dessiner une
    silhouette troublante. Ce n''était pas une simple disparition ; c''était un coup
    de pied dans la fourmilière bien organisée de cette ville où le pouvoir et le
    crime se partageaient le pouvoir dans une étreinte vicieuse.


    Il avait le nom de la disparue : Clara Dubois. Une employée de bureau sans histoire,
    apparemment. Mais Rose avait ajouté, avec cette froideur calculée qui le mettait
    mal à l''aise, que Clara travaillait sur des audits sensibles. Des audits qui
    touchaient, selon ses mots, « des gens qui aiment rester dans l''ombre ». Les
    « gens de l''ombre » étaient légion dans cette ville, des hommes d''affaires aux
    mains aussi propres que leurs livres de comptes étaient entachés, des politiciens
    qui vendaient leur âme au plus offrant, et des truands qui faisaient le sale boulot
    avec une efficacité glaçante.


    Mason parcourut une liste de transactions financières suspectes. Des sommes énormes
    transitaient par des sociétés écrans, des flux d''argent difficiles à suivre,
    comme une fumée s''évaporant dans la nuit. Il y avait des noms qui revenaient
    sans cesse, des figures publiques côtoyant celles qui préféraient les bas-fonds.
    Un dénominateur commun semblait émerger : une entreprise de construction, la "Horizon
    Development", qui avait récemment obtenu plusieurs marchés publics lucratifs,
    malgré des pratiques douteuses évidentes. Les rapports d''audit que Clara avait
    ébauchés pointaient du doigt des surfacturations massives, des malversations qui
    alimentaient les poches de certains et finançaient, sans doute, bien d''autres
    choses moins avouables.


    Ses doigts tapotaient nerveusement le bord de sa chemise. Le lien était là, tangible.
    La disparition de Clara Dubois n''était pas un acte isolé, mais une conséquence
    directe de ses découvertes. Quelqu''un avait voulu faire disparaître les preuves,
    et Clara était cette preuve vivante. L''organisation de Rose, quelle qu''elle
    soit, semblait bien informée. Et leur intérêt pour cette affaire suggérait qu''ils
    n''étaient pas de simples spectateurs. Avaient-ils eux-mêmes des intérêts dans
    cette corruption ? Ou travaillaient-ils pour les victimes, cherchant à démanteler
    le réseau ? L''ambiguïté était le pain quotidien dans ce métier, et Mason apprenait
    à s''en accommoder.


    Il jeta un coup d''œil à la porte du bar, comme s''il s''attendait à voir Millie
    réapparaître, son regard intense cherchant quelque chose qu''il n''arrivait pas
    encore à identifier. Il la sentait, cette présence, comme une vibration basse
    fréquente qui annonçait un orage. Avait-elle un lien avec cette affaire ? Ou était-elle
    là par coïncidence ? Une autre pièce sur cet échiquier sombre, une pièce dont
    il ne connaissait pas encore le jeu. Son instinct lui disait que Millie était
    bien plus qu''une simple personne à retrouver. Elle cherchait quelque chose, elle
    aussi, peut-être la même chose que Clara avait trouvé, et qui l''avait menée à
    sa perte. La pluie dehors redoubla d''intensité, comme si la ville elle-même pleurait
    sa propre décomposition.'
  chapter_summary: "**Notes de continuité – Chapitre « Black Cat »**  \n\n- **Lieu\
    \ & ambiance** : Le bar « Black Cat », pluie battante, verre sale, bruit de fond.\
    \ Atmosphère morose qui reflète le malaise de Mason.  \n\n- **Protagoniste** :\
    \ Mason, entouré de papiers brouillons et d’un café froid.  \n  - **État émotionnel**\
    \ : Stress, frustration, suspicion croissante.  \n\n- **Informations reçues**\
    \ :  \n  - Disparition de **Clara Dubois**, employée de bureau.  \n  - Clara travaillait\
    \ sur des **audits sensibles** touchant des « gens de l’ombre » (hommes d’affaires,\
    \ politiciens corrompus, truands).  \n  - Rose, la source, donne ces détails avec\
    \ une froideur qui met Mason mal à l’aise.  \n\n- **Enquête de Mason** :  \n \
    \ - Analyse de transactions suspectes : grosses sommes, sociétés écrans, flux\
    \ d’argent opaques.  \n  - **Dénominateur commun** identifié : **Horizon Development**,\
    \ entreprise de construction obtenant des marchés publics douteux.  \n  - Audits\
    \ de Clara pointaient des **surfacturations** et des malversations alimentant\
    \ un réseau criminel.  \n\n- **Déduction** :  \n  - Disparition de Clara = tentative\
    \ d’éliminer la preuve vivante.  \n  - L’organisation de Rose possède des informations\
    \ et un intérêt direct (peut être alliée ou complice).  \n\n- **Présence secondaire**\
    \ :  \n  - **Millie** (personnage encore vague) apparaît brièvement à la porte\
    \ du bar.  \n  - Mason ressent une vibration, pense qu’elle est liée à l’affaire,\
    \ mais le rôle exact reste inconnu.  \n\n- **Tensions non résolues** :  \n  -\
    \ Motives réels de Rose et de son organisation (démantèlement du réseau ou participation).\
    \  \n  - Connexion exacte entre Millie et la disparition de Clara.  \n  - Risque\
    \ que Mason devienne à son tour une cible.  \n\n- **État final du chapitre** :\
    \  \n  - Mason possède des pistes claires (Horizon Development, audits de Clara)\
    \ mais aucune preuve concrète.  \n  - Ambiance renforcée par l’augmentation de\
    \ la pluie, symbolisant la décadence de la ville.  \n  - Le lecteur attend la\
    \ prochaine confrontation avec Millie et la mise en lumière du réseau corrompu.\
    \  "
