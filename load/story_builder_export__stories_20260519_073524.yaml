    \ kleiner Stern glänzt.  \n\n**Wichtige Ereignisse & Entscheidungen**  \n- Violet\
    \ stoppt und spricht ernst mit Jasper: *„Unser Königreich ist verflucht.“*  \n\
    - Sie erklärt, dass ein alter Fluch seit Jahrhunderten über Eldoria liegt und\
    \ stärker wird, wenn das Versprechen der Wächter vergessen wird.  \n- Der Anhänger\
    \ in Roses Hand ist ein Zeichen dieses Versprechens.  \n- Rose fühlt, dass sie\
    \ das Versprechen fast vergessen hat.  \n- Noah erinnert aus alten Schriften,\
    \ dass nur das „Herz der Wächter“ (Roses Versprechen) den Fluch brechen kann.\
    \  \n- Jasper beschließt, das Versprechen zu finden und zu erneuern.  \n- Violet\
    \ warnt, dass der Fluch die Herzen vergiften kann; Mut muss mit Vorsicht verbunden\
    \ sein.  \n\n**Emotionale Veränderungen**  \n- Jasper wechselt von neugieriger\
    \ Energie zu gemischtem Lächeln und Sorge.  \n- Rose wird nervös, dann entschlossen.\
    \  \n- Die Gruppe spürt Angst, als ein leises Heulen und ein Schatten aus dem\
    \ Wald kommen.  \n\n**Enthüllte Informationen**  \n- Der Fluch entsteht, wenn\
    \ das Versprechen der ersten Wächter vergessen wird.  \n- Der Anhänger ist das\
    \ Symbol dieses Versprechens.  \n- Der Weise im Turm kennt die genauen Worte,\
    \ um das Versprechen zu erneuern.  \n\n**Offene Spannung**  \n- Der Schatten im\
    \ Wald und das Heulen zeigen, dass der Fluch bereits aktiv ist.  \n- Unklar, wie\
    \ die Gruppe das Versprechen beim Weisen finden und erneuern wird.  \n- Gefahr,\
    \ dass jemand zu voreilig handelt und dem Fluch verfällt.  \n\n**Endzustand des\
    \ Kapitels**  \n- Die Gruppe setzt ihren Weg zum Turm des Weisen fort, nun schwerer\
    \ belastet von Violets Warnungen.  \n- Der Wald wird dichter, Nebel legt sich\
    \ um sie, aber ihr Wille, Eldoria zu retten, wächst.  \n- Sie nähern sich dem\
    \ „Herzen des alten Fluchs“ und halten die Hoffnung, das Königreich zu befreien.\
    \  "
