  chapter_body: "**Kapitel 1 – Das seltsame Relikt**\n\nDer Morgen war noch warm,\
    \ als die vier Freunde vom Markttisch zum Rand der Stadt gingen. Jasper ließ die\
    \ Augen über die Stände wandern und suchte nach etwas Interessantem. „Vielleicht\
    \ finden wir ja etwas, das wir noch nie gesehen haben“, sagte er fröhlich und\
    \ zog seine bunte Jacke etwas höher.\n\nPlötzlich blieb er vor einem kleinen Holzstand\
    \ stehen, auf dem alte, verstaubte Gegenstände lagen. Zwischen zerbrüchigen Tonkrügen\
    \ und verblassten Stoffen lag ein silberner Anhänger, der im Sonnenlicht flackerte.\
    \ Er war rund, hatte die Form einer stilisierten Rose und ein leises, kaum hörbares\
    \ Summen.\n\n\n\n„Schaut euch das an!“, rief Jasper und hielt das Relikt hoch.\
    \ „Es sieht aus, als wäre es aus einer anderen Zeit.“  \n\nRose trat näher, ihr\
    \ Blick blieb kurz an dem Anhänger hängen. Ein kurzer Schauer lief ihr über die\
    \ Haut. Sie dachte an etwas, das sie lange vergessen hatte, doch die Erinnerung\
    \ war noch verschwommen.\n\n„Das ist…“, begann sie, und ihre Stimme war leiser\
    \ als sonst. „Ich habe diesen Gegenstand einst in einer alten Ruine gesehen.“\
    \  \n\nViolet, die am Rand stand, sah interessiert zu. „Eine Ruine, sagst du?\
    \ In den tiefen Wäldern von Eldoria gibt es viele verlassene Orte.“ Sie nickte\
    \ langsam, als wolle sie mehr erfahren.\n\nNoah, der die Szene aufmerksam beobachtete,\
    \ fuhr mit der Hand über den Anhänger. „Das Muster der Rose ist ein altes Symbol\
    \ der Wächter. Es wurde von einer vergessenen Schutzgruppe getragen.“ Er lächelte\
    \ sarkastisch. „Vielleicht gehört es jetzt dir, Jasper, als dein erstes Fundstück.“\n\
    \nJasper grinste breit. „Ich gebe es dir, Rose. Vielleicht hilft es dir, dich\
    \ an etwas Wichtiges zu erinnern.“ Er reichte ihr den Anhänger vorsichtig.  \n\
    \nAls Rose das kühle Metall berührte, flammen Erinnerungen in ihrem Kopf auf.\
    \ Sie sah ein junges Mädchen in einer hellen Halle, das mit einer ähnlichen Rose\
    \ um den Hals stand. Die Halle war von leuchtenden Kristallen erhellt, und im\
    \ Hintergrund hörte man ein Flüstern – ein Versprechen, das Land zu schützen.\
    \  \n\nEin leichter Wind wehte durch den Platz, und die Blätter der Marktstände\
    \ raschelten. Rose schloss die Augen und atmete tief ein. „Ich… ich habe das Versprechen\
    \ fast vergessen“, flüsterte sie. „Ich dachte, es sei nur eine Legende.“  \n\n\
    Violet trat näher und legte eine Hand auf Rosens Schulter. „Manchmal sind Legenden\
    \ mehr als Geschichten. Vielleicht steckt hinter diesem Symbol der Schlüssel zu\
    \ einer alten Gefahr, die das Königreich bedroht.“  \n\nNoah sah zu den vier und\
    \ sagte ruhig: „Wir sollten das Relikt zum alten Weisen im Turm bringen. Er kennt\
    \ die Geschichte der Wächter.“  \n\nJasper nickte entschlossen. „Dann lass uns\
    \ keine Zeit verlieren. Das Abenteuer ruft!“  \n\nDie Gruppe machte sich auf den\
    \ Weg, den Markt hinter sich lassend. Der Anhänger glitzerte in Rosens Hand, während\
    \ ein Funken von Hoffnung und zugleich eine leise Angst in ihr wuchs. Das Geheimnis\
    \ ihrer Vergangenheit – und vielleicht die Zukunft des Königreichs – lag jetzt\
    \ in ihrer Hand."
  chapter_summary: "**Kapitel‑Zusammenfassung (Deutsch, B1)**  \n\n- Vier Freunde\
    \ (Jasper, Rose, Violet, Noah) gehen vom Markttisch zum Stadtrand.  \n- Jasper\
    \ findet an einem Holzstand einen silbernen, runden Anhänger in Form einer stilisierten\
    \ Rose. Der Anhänger summt leise.  \n- Rose spürt einen kurzen Schauer, erinnert\
    \ sich vage an einen ähnlichen Gegenstand aus einer alten Ruine.  \n- Violet erwähnt\
    \ die Ruinen im Wald von Eldoria.  \n- Noah erklärt, dass das Rosen‑Symbol zu\
    \ einer längst vergessenen Wächter‑Gruppe gehört.  \n- Jasper gibt den Anhänger\
    \ an Rose, weil er hofft, dass er ihr hilft, sich zu erinnern.  \n- Beim Berühren\
    \ des Anhängers kommen Rose Erinnerungen zurück: ein junges Mädchen in einer kristallbeleuchteten\
    \ Halle, ein Versprechen, das Land zu beschützen.  \n- Rose flüstert, dass sie\
    \ das Versprechen fast vergessen hat und dachte, es sei nur eine Legende.  \n\
    - Violet legt Rose die Hand auf die Schulter und sagt, dass Legenden echte Gefahr\
    \ verbergen können.  \n- Noah schlägt vor, das Relikt zum alten Weisen im Turm\
    \ zu bringen – er kennt die Geschichte der Wächter.  \n- Jasper stimmt zu, sie\
    \ wollen sofort losgehen.  \n- Gruppe verlässt den Markt, Anhänger glitzert in\
    \ Roses Hand.  \n- **Offene Spannung:** Was ist das Versprechen, welche Gefahr\
    \ droht dem Königreich, und welche Rolle spielt das Relikt?  \n- **Endzustand:**\
    \ Die Freunde sind entschlossen, den Weisen zu finden; Hoffnung und leichte Angst\
    \ liegen bei Rose.  "
