    \ är farlig”, säger han.  \n- Han stänger en stor dörr. Dörren låser med ett hårt\
    \ klick.  \n- “Ni är fast”, säger Noah.  \n\n- Maisie tar den rostiga nyckeln\
    \ och försöker öppna låset.  \n- Noah har redan låst låset med extra spänst. Nyckeln\
