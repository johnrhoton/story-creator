  chapter_body: "**Kapitel 5 – Maisie avslöjar konspirationen innan våldet sprider\
    \ sig**\n\nMorgonen är kall. Maisie, Isabelle och Noah sitter i den mörka källaren.\
    \ På bordet ligger den tunga väskan med papper. I Maisies ficköppning ligger den\
    \ rostiga nyckeln.\n\n“Vi måste gå ut”, säger Maisie. Hon tar nyckeln och sätter\
    \ den i låset. Låset klickar. Dörren öppnas.\n\nDe kliver ut i den kalla natten.\
    \ Snön faller lätt. Stadens ljus glimmar långt bort.\n\nPå gatan hör de musik,\
    \ fyrverkerier och rop. På många byggnader hänger banderoller. En banderoll säger\
    \ “Rättvisa för alla”. En annan säger “Starkare makt”.\n\nIsabelle tar fram den\
    \ blöta lappen. På lappen står:  \n\n„Möt mig i skuggan vid fontänen. – V”\n\n\
    Hon visar lappen för Maisie. “Vinnie var här”, viskar Isabelle.\n\nDe går snabbt\
    \ mot stadshuset. Stora trappor leder upp till den stora salen där folk samlas.\n\
    \nUtanför salen står en grupp med svärd och röda fanor. De ropar och är arga.\
    \ En soldat pekar på dem. Alla väntar på vad som händer.\n\nNoah, den stora mannen\
    \ i mörka kläder, kommer fram. “Stanna”, säger han med låg röst. “Det är farligt”.\n\
    \nMaisie tar fram en av papperna. På pappret är en bild av en kappa med en krona\
    \ och en orm. ”Det här är symbolen för Skuggornas råd”, säger hon. ”De styr både\
    \ de rika och de fattiga i hemlighet.”\n\nHon visar fler papper. På pappren står\
    \ namn på personer i staden. Det står också hur de planerar att starta våld för\
    \ att ta makt.\n\nFolk i salen tittar på pappren. En ung man ropar: “Är detta\
    \ sant?”  \n\nNoah försöker ta pappret, men Maisie håller det hårt. ”Nej”, säger\
    \ hon. ”Vi måste berätta sanningen.”\n\nLjudet av fyrverkerier blir tystare. Soldaten\
    \ lägger ner svärdet. Människorna ser varandra i ögonen. De börjar prata lugnt.\n\
    \nEn äldre man, ledaren för protesten, säger: “Vi vill fred. Vi tror inte längre\
    \ på lögner.” Han pekar på pappren och säger: “Här är bevis.”\n\nRösterna i gatan\
    \ blir mjukare. Folket sakta sprider sig och lämnar torget utan att slåss. En\
    \ lugn känsla fyller luften.\n\nMaisie tar fram den rostiga nyckeln igen. Hon\
    \ håller den i handen och ser på den. Hon känner sig stark. “Vi har gjort det”,\
    \ säger hon tyst. “Vinnie skulle vara stolt.”\n\nIsabelle ler svagt. “Vi måste\
    \ fortsätta”, säger hon. “Men nu är staden trygg för ikväll.”\n\nNoah ser på dem.\
    \ Hans ögon blir mjukare. “Kanske var jag fel”, säger han. “Jag vill hjälpa till.”\n\
    \nStaden blir tyst. Ljuset från lamporna blinkar mjukt. Folk går hem, men de pratar\
    \ om vad de har sett. De vet att sanningen är ute.\n\nMaisie stoppar ner nyckeln\
    \ i fickan. Hon ser ut över torget. Hon känns lugn men också beredd. Hon vet att\
    \ fler hemligheter kan komma, men nu har de stoppat våldet.\n\nKapitel fem slutar\
    \ med att staden vilar i fred. Maisie, Isabelle och Noah går tillsammans bort\
    \ från torget, med papperna i väskan och ett löfte om att fortsätta kämpa för\
    \ sanningen."
