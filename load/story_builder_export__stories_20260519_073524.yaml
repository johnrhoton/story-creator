  chapter_description: Noah attempts to silence the investigation permanently.
  chapter_body: "Maisie, Isabelle och Noah gick ut ur det hemliga rummet. Kylan slog\
    \ mot deras ansikten. De bar en tung väska med papper. På väskan låg den rostiga\
    \ nyckeln.  \n\n\"Vi måste visa bevisen,\" sa Maisie. Hon såg på Isabelle.  \n\
    \nIsabelle nickade. \"Ja, staden måste veta sanningen.\"  \n\nPlötsligt hördes\
    \ ett steg. En mörk skugga föll över dem. Det var Noah. Han stod i dörren till\
    \ en gammal källare.  \n\n\"Stanna här,\" ropade han med djup röst.  \n\nMaisie\
    \ såg på honom. Hon kände hans stora kropp. \"Vad vill du?\" frågade hon.  \n\n\
    \"Noah\" svarade han. \"Jag kan inte låta er gå vidare. Jag ska stoppa undersökningen\
    \ för alltid.\"  \n\nHan sträckte ut sin hand. I hans hand var en tung järnbalk.\
    \  \n\n\"Noah, ge tillbaka väskan,\" sa Isabelle med darrande röst.  \n\nNoah\
    \ tog väskan. \"Den här informationen är farlig,\" sa han. \"Den får inte komma\
    \ ut.\"  \n\nHan pressade en stor dörr. Dörren lät som en sten. Den stängdes med\
    \ ett hårt klick.  \n\n\"Ni är fast,\" sa Noah. \"Ingen kan lämna.\"  \n\nMaisie\
    \ såg på den rostiga nyckeln i sin ficka. Hon tog fram den snabbt.  \n\n\"Jag\
    \ öppnar låset,\" sa hon.  \n\nHon tryckte nyckeln i låset. Men Noah hade redan\
    \ låst låset med ett extra spänst. Nyckeln gick inte att vrida.  \n\nIsabelle\
    \ såg sig omkring. Det fanns bara väggar och mörker. En kall vind blåste genom\
    \ källaren.  \n\n\"Noah, släpp oss,\" ropade hon.  \n\nNoah skrattade kort. \"\
    Det finns ingen väg ut.\"  \n\nPlötsligt hörde de ett svagt ljud ovanför. En röst\
    \ ropade: \"Kom snabbt tillbaka!\" Det var Vinnies röst, men den var bara en ekon.\
    \  \n\nMaisie försökte dra sig loss. Hon pressade sin starka arm mot dörren. Men\
    \ Noahs muskler var starkare.  \n\nHan drack en klunk vatten och sa: \"Det är\
    \ för sent.\"  \n\nLjuset började bli mörkare. Skuggorna rörde sig i taket.  \n\
    \nMaisie kände hur hennes hjärta slog snabbt. Hon visste att de måste hitta en\
    \ annan väg.  \n\nMen Noah stod kvar vid dörren, med järnbalken i handen, och\
    \ såg på dem utan att säga ett ord.  \n\nKylan, mörkret och tystnaden omgav dem.\
    \ De var fast i källaren, med ingen idé om hur de skulle ta sig ut.  \n\nDet var\
    \ en tyst, hotfull stund.  \n\n---  "
