  chapter_body: "Şehirde bir sabah. Güneş hafifçe parlıyor. Kavşakta bir kafe var.\
    \ Kafenin penceresinden hafif bir müzik çalıyor. Çalışanlar ve öğrenciler masalarda\
    \ oturuyor. İçeride kahve kokusu ve hafif bir gürültü var.\n\nMason kafenin köşesinde\
    \ oturmuş. İnce bir vücudu, soluk teni var. İnce çerçeveli gözlük takıyor. Kitap\
    \ okuyor, gözleri bazen aşağıya, bazen yukarıya bakıyor. Ellerini sık sık çırpıyor,\
    \ biraz gergin gibi. Yine de konuşurken sesinde sıcak bir çekicilik var.\n\nİris\
    \ içeri giriyor. Uzun, ince ve zarif. Saçları hafif dalgalı, gözleri sakin ve\
    \ mavi. Sessiz ama kendinden emin yürüyüşü var. Elinde basit bir gümüş yüzük.\
    \ Masaya otururken bakışları etrafı izliyor, ama bir şeyleri tartıyor gibi duruyor.\
    \ Sessiz bir gücü var.\n\nMaisie de kafenin kapısını açıyor. Atletik bir vücudu,\
    \ güçlü bir duruşu var. Ellerinde hafif yara izleri, kahverengi gözleri dikkatli\
    \ bakıyor. Yüzünde hafif bir alay ifadesi, sesi ise biraz keskin. Masaya otururken\
    \ etrafı inceliyor, sanki bir şeyleri anlamaya çalışıyor. \n\nÜçü de aynı şehirde,\
    \ aynı kafede bulunuyor. Şehrin hızlı temposu, kafede bir anlık duraklama gibi.\
    \ Her biri kendi düşünceleriyle, geçmişin izleriyle ve geleceğin planlarıyla dolu.\
    \ Bu sabah, onların yolları bir kez daha kesişiyor."
  chapter_summary: "**Bölüm Özeti (A1 – Türkçe)**  \n\n- Sabah. Güneş parlıyor.  \n\
    - Bir kavşakta kafe var. İçeride müzik çalıyor, kahve kokuyor.  \n- Mason köşede\
    \ oturuyor. İnce, soluk tenli. Gözlüğü var, kitap okuyor. Ellerini çırpıyor, biraz\
    \ gergin ama sesi sıcak.  \n- İris içeri giriyor. Uzun, ince, zarif. Saçları dalgalı,\
    \ gözleri mavi. Elinde gümüş bir yüzük. Masaya oturur, etrafına bakar, bir şeyler\
    \ düşünüyor.  \n- Maisie de kapıyı açar. Atletik, güçlü. Ellerinde yara izleri,\
    \ kahverengi gözleri dikkatli. Alaycı bir yüz ifadesi var, sesi keskin. Masada\
    \ oturur, etrafı inceler.  \n- Üç karakter aynı şehirde, aynı kafede. Her biri\
    \ geçmişi ve geleceği düşünür.  \n- Bu sabah yolları tekrar kesişir.  \n\n**Karakter\
    \ kararları ve duygular**  \n- Mason kitap okumaya devam eder, gergin ama konuşmak\
    \ ister.  \n- İris sessiz ama kendinden emin, yüzükünü tutar.  \n- Maisie dikkatli\
    \ ve alaycı, çevresini anlamaya çalışır.  \n\n**Açığa çıkan bilgiler**  \n- Mason’un\
    \ gerginliği, İris’in gümüş yüzüğü, Maisie’nin yara izleri.  \n\n**Çözülmemiş\
    \ gerilim**  \n- Üçünün aynı anda kafede olması, birbirlerine ne söyleyecekleri\
    \ belli değil.  \n\n**Bölüm sonunda durum**  \n- Mason, İris ve Maisie masada\
    \ oturur, birbirlerine bakar, sessiz bir an vardır.  \n- Hikaye burada durur,\
    \ sonraki olaylar beklenir."
