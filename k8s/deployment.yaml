apiVersion: apps/v1
kind: Deployment
metadata:
  name: story-builder
  namespace: story-builder
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: story-builder
  template:
    metadata:
      labels:
        app: story-builder
    spec:
      initContainers:
        - name: prepare-data-directories
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /app/data/sqlite /app/data/chroma && chown -R 10001:10001 /app/data
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: env-file
              mountPath: /app/.env
              subPath: .env
              readOnly: true
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: story-builder
          image: ghcr.io/johnrhoton/story-builder:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
          env:
            - name: DB_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: DB_PROVIDER
                  optional: true
            - name: STORY_DB_PATH
              value: /app/data/sqlite/story_builder.db
            - name: CHROMA_DB_PATH
              value: /app/data/chroma
            - name: VECTOR_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: VECTOR_PROVIDER
                  optional: true
            - name: STREAMLIT_SERVER_ADDRESS
              value: 0.0.0.0
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
            - name: DEFAULT_LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: DEFAULT_LLM_PROVIDER
                  optional: true
            - name: DEFAULT_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: DEFAULT_LLM_MODEL
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: GROQ_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: ENABLE_LLM_CONTENT_LOGGING
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: ENABLE_LLM_CONTENT_LOGGING
                  optional: true
            - name: AUTH_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: AUTH_COOKIE_SECRET
                  optional: true
            - name: AUTH_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: AUTH_REDIRECT_URI
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: GOOGLE_SERVER_METADATA_URL
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: GOOGLE_SERVER_METADATA_URL
                  optional: true
            - name: AUTH_DEBUG
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: AUTH_DEBUG
                  optional: true
            - name: APP_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: APP_MONGO_URI
                  optional: true
            - name: APP_MONGO_DATABASE
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: APP_MONGO_DATABASE
                  optional: true
            - name: BACKUP_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: BACKUP_MONGO_URI
                  optional: true
            - name: BACKUP_MONGO_DATABASE
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: BACKUP_MONGO_DATABASE
                  optional: true
            - name: VECTOR_INDEX_NAME
              valueFrom:
                secretKeyRef:
                  name: story-builder-secrets
                  key: VECTOR_INDEX_NAME
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: env-file
              mountPath: /app/.env
              subPath: .env
              readOnly: true
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: story-builder-data
        - name: env-file
          secret:
            secretName: story-builder-secrets
            optional: true
            items:
              - key: .env
                path: .env
