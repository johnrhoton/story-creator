apiVersion: v1
kind: Secret
metadata:
  name: story-builder-secrets
  namespace: story-builder
type: Opaque
stringData:
  .env: |
    AUTH_COOKIE_SECRET=replace-with-a-long-random-string
    AUTH_REDIRECT_URI=http://story-builder.local/oauth2callback
    GOOGLE_CLIENT_ID=replace-with-google-client-id
    GOOGLE_CLIENT_SECRET=replace-with-google-client-secret
    GOOGLE_SERVER_METADATA_URL=https://accounts.google.com/.well-known/openid-configuration
    AUTH_DEBUG=false

    DB_PROVIDER=sqlite
    VECTOR_PROVIDER=chroma
    DEFAULT_LLM_PROVIDER=Groq
    DEFAULT_LLM_MODEL=llama-3.3-70b-versatile
    ENABLE_LLM_CONTENT_LOGGING=false

    GROQ_API_KEY=replace-with-groq-api-key
    GEMINI_API_KEY=replace-with-gemini-api-key
    OPENROUTER_API_KEY=replace-with-openrouter-api-key

    APP_MONGO_URI=
    APP_MONGO_DATABASE=story_builder
    BACKUP_MONGO_URI=
    BACKUP_MONGO_DATABASE=story_builder
    VECTOR_INDEX_NAME=story_memory_vector_index

  AUTH_COOKIE_SECRET: "replace-with-a-long-random-string"
  AUTH_REDIRECT_URI: "http://story-builder.local/oauth2callback"
  GOOGLE_CLIENT_ID: "replace-with-google-client-id"
  GOOGLE_CLIENT_SECRET: "replace-with-google-client-secret"
  GOOGLE_SERVER_METADATA_URL: "https://accounts.google.com/.well-known/openid-configuration"
  AUTH_DEBUG: "false"

  DB_PROVIDER: "sqlite"
  VECTOR_PROVIDER: "chroma"
  DEFAULT_LLM_PROVIDER: "Groq"
  DEFAULT_LLM_MODEL: "llama-3.3-70b-versatile"
  ENABLE_LLM_CONTENT_LOGGING: "false"

  GROQ_API_KEY: "replace-with-groq-api-key"
  GEMINI_API_KEY: "replace-with-gemini-api-key"
  OPENROUTER_API_KEY: "replace-with-openrouter-api-key"

  APP_MONGO_URI: ""
  APP_MONGO_DATABASE: "story_builder"
  BACKUP_MONGO_URI: ""
  BACKUP_MONGO_DATABASE: "story_builder"
  VECTOR_INDEX_NAME: "story_memory_vector_index"
